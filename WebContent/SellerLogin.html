<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Login</title>

<style>
body {
  margin:0;
  font-family:Poppins;
  background:linear-gradient(135deg,#232526,#414345);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box {
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(20px);
  padding:30px;
  border-radius:20px;
}

input {
  width:100%;
  padding:10px;
  margin:10px 0;
}

button {
  width:100%;
  padding:12px;
  background:linear-gradient(45deg,#ff416c,#ff4b2b);
  border:none;
  color:white;
}
</style>
</head>

<body>

<form class="box" action="adminlog" method="post">
<h2>Admin Login</h2>

<input type="text" name="username" placeholder="Username">
<input type="password" name="password" placeholder="Password">

<button>Login</button>
</form>

</body>
</html>
