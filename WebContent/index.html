<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Book Store</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body {
  font-family:'Poppins',sans-serif;
  background: radial-gradient(circle at top,#1e3c72,#0f2027);
  color:white;
  overflow-x:hidden;
}

/* NAVBAR */
.navbar {
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
  background:rgba(0,0,0,0.4);
  backdrop-filter: blur(10px);
}

.navbar a {
  color:white;
  margin-left:20px;
  text-decoration:none;
  transition:0.3s;
}

.navbar a:hover {
  color:#00f2ff;
}

/* 3D TITLE */
.hero {
  text-align:center;
  margin-top:80px;
}

.hero h1 {
  font-size:60px;
  text-shadow:
    0 5px 0 #000,
    0 10px 20px rgba(0,0,0,0.5);
  animation: float 3s ease-in-out infinite;
}

@keyframes float {
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-15px);}
}

/* CARDS */
.cards {
  display:flex;
  justify-content:center;
  gap:30px;
  margin-top:60px;
  flex-wrap:wrap;
}

.card {
  width:260px;
  padding:25px;
  border-radius:20px;
  background:rgba(255,255,255,0.1);
  backdrop-filter: blur(15px);
  box-shadow:0 10px 30px rgba(0,0,0,0.5);
  transition:0.4s;
}

.card:hover {
  transform:rotateY(10deg) scale(1.05);
}

/* BUTTON */
.btn {
  margin-top:20px;
  padding:12px 25px;
  border-radius:30px;
  border:none;
  background:linear-gradient(45deg,#00f2ff,#4facfe);
  color:white;
  cursor:pointer;
  transition:0.3s;
}

.btn:hover {
  transform:scale(1.1);
}
</style>
</head>

<body>

<div class="navbar">
  <h2>📚 BookStore</h2>
  <div>
    <a href="index.html">Home</a>
    <a href="login.html">Login</a>
    <a href="CustomerRegister.html">Register</a>
  </div>
</div>

<div class="hero">
  <h1>Online Book Store</h1>
  <p>Discover • Learn • Grow</p>
  <button class="btn" onclick="location.href='login.html'">Let's Begin :)</button>
</div>

<div class="cards">
  <div class="card">
    <h3>📖 Explore</h3>
    <p>Thousands of books</p>
  </div>

  <div class="card">
    <h3>🚀 Learn</h3>
    <p>Boost your knowledge</p>
  </div>

  <div class="card">
    <h3>🌍 Community</h3>
    <p>Join readers worldwide</p>
  </div>
</div>

</body>
</html>
