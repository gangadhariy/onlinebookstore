<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
body {
  margin:0;
  font-family:Poppins;
  background:linear-gradient(135deg,#141e30,#243b55);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box {
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(20px);
  padding:40px;
  border-radius:20px;
  text-align:center;
  box-shadow:0 0 40px rgba(0,0,0,0.5);
}

button {
  width:250px;
  margin:15px 0;
  padding:15px;
  border:none;
  border-radius:30px;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

.admin {
  background:linear-gradient(45deg,#ff416c,#ff4b2b);
}

.user {
  background:linear-gradient(45deg,#00c6ff,#0072ff);
}

button:hover {
  transform:scale(1.1);
}
</style>
</head>

<body>

<div class="box">
  <h2>Choose Login Type</h2>

  <button class="admin" onclick="location.href='SellerLogin.html'">
    Admin Login
  </button>

  <button class="user" onclick="location.href='CustomerLogin.html'">
    Customer Login
  </button>

  <button onclick="location.href='CustomerRegister.html'">
    Register
  </button>
</div>

</body>
</html>
