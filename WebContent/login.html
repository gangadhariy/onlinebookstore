<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login - Online Book Store</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css">

<style>
body {
    font-family: 'Poppins', sans-serif;
    margin: 0;
    height: 100vh;
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    display: flex;
    flex-direction: column;
}

/* Navbar */
.navbar {
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);
}

.navbar a {
    color: white !important;
}

/* Center container */
.main-container {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Card */
.login-card {
    background: rgba(255,255,255,0.1);
    padding: 40px;
    border-radius: 20px;
    backdrop-filter: blur(15px);
    text-align: center;
    color: white;
    width: 350px;
    animation: fadeIn 1s ease-in-out;
}

/* Buttons */
.btn-custom {
    width: 100%;
    margin-top: 15px;
    border-radius: 25px;
    font-weight: 500;
    transition: 0.3s;
}

.btn-admin {
    background: #ff4b2b;
    border: none;
}

.btn-admin:hover {
    background: #ff6a4b;
    transform: scale(1.05);
}

.btn-user {
    background: #00c6ff;
    border: none;
}

.btn-user:hover {
    background: #33d6ff;
    transform: scale(1.05);
}

.btn-register {
    background: transparent;
    border: 1px solid white;
}

.btn-register:hover {
    background: white;
    color: black;
}

/* Animation */
@keyframes fadeIn {
    from {opacity: 0; transform: translateY(30px);}
    to {opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-sm">
    <a class="navbar-brand text-white" href="index.html">
        <img src="logo.png" width="60">
    </a>

    <div class="ml-auto">
        <a class="nav-link d-inline" href="index.html">Home</a>
        <a class="nav-link d-inline active" href="#">Login</a>
        <a class="nav-link d-inline" href="CustomerRegister.html">Register</a>
    </div>
</nav>

<!-- Center Login Card -->
<div class="main-container">
    <div class="login-card">

        <h2>Welcome Back</h2>
        <p>Select how you want to continue</p>

        <a href="SellerLogin.html" class="btn btn-custom btn-admin">
            Login as Admin
        </a>

        <a href="CustomerLogin.html" class="btn btn-custom btn-user">
            Login as Customer
        </a>

        <a href="CustomerRegister.html" class="btn btn-custom btn-register">
            New user? Register
        </a>

    </div>
</div>

<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/js/bootstrap.min.js"></script>

</body>
</html>
