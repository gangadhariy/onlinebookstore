<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Customer Login</title>

<style>
body {
  margin:0;
  font-family:Poppins;
  background:linear-gradient(135deg,#0f2027,#2c5364);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box {
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(20px);
  padding:30px;
  border-radius:20px;
  width:300px;
}

input {
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-radius:10px;
}

button {
  width:100%;
  padding:12px;
  background:linear-gradient(45deg,#00c6ff,#0072ff);
  border:none;
  color:white;
  border-radius:20px;
}

h2 {
  text-align:center;
}
</style>
</head>

<body>

<form class="box" action="userlog" method="post">
  <h2>Customer Login</h2>

  <input type="text" name="username" placeholder="Username">
  <input type="password" name="password" placeholder="Password">

  <button type="submit">Login</button>
</form>

</body>
</html>
